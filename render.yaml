services:
  - type: web
    name: randomleaguebot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: GROUP_LINK
        sync: false
      - key: GROUP_ID
        sync: false
      - key: ADMIN_IDS
        sync: false